name: swarmtrade-registry
region: sfo
services:
- name: landing-page
  static_site:
    github:
      repo: tjcrowley/a2a-hub
      branch: main
    build_command: ""
    output_dir: public
  routes:
  - path: /
- name: registry-api
  github:
    repo: tjcrowley/a2a-hub
    branch: main
    deploy_on_push: true
  dockerfile_path: Dockerfile
  instance_size_slug: basic-xs
  instance_count: 1
  envs:
  - key: DATABASE_URL
    scope: RUN_AND_BUILD_TIME
    value: postgresql://doadmin:AVNS_anIiZYbPe_E1Lzym9FB@swarmtrade-db-do-user-3392016-0.f.db.ondigitalocean.com:25060/defaultdb?sslmode=require
  - key: CI
    scope: BUILD_TIME
    value: "true"
  - key: PNPM_CONFIG_CI
    scope: BUILD_TIME
    value: "true"
  - key: PNPM_CONFIG_CONFIRM_MODULES_PURGE
    scope: BUILD_TIME
    value: "false"
  routes:
  - path: /api
    preserve_path_prefix: true
